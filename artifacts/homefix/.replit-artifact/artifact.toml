kind = "mobile"
previewPath = "/"
title = "HomeFix"
version = "1.0.0"
id = "artifacts/homefix"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20807

[services.development]
run = "pnpm --filter @workspace/homefix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/homefix", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/homefix", "run", "serve" ]

[services.env]
PORT = "20807"
BASE_PATH = "/"
